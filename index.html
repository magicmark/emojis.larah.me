<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emojis</title>
</head>
<body>
  <header class="search-bar">
    <a href="/" class="logo" aria-label="emojis.larah.lol">
      <svg viewBox="0 0 260 38" xmlns="http://www.w3.org/2000/svg" class="logo-svg">
        <defs>
          <filter id="drop" x="-4%" y="-4%" width="108%" height="120%">
            <feDropShadow dx="2" dy="2" stdDeviation="1.5" flood-color="#1a1a1a" flood-opacity="0.35"/>
          </filter>
          <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#ff6b35"/>
            <stop offset="35%" stop-color="#f7c948"/>
            <stop offset="65%" stop-color="#e84393"/>
            <stop offset="100%" stop-color="#6c5ce7"/>
          </linearGradient>
        </defs>
        <text x="2" y="28" font-family="'Arial Black', 'Impact', sans-serif" font-size="28" font-weight="900" font-style="italic" letter-spacing="-1" fill="url(#g1)" filter="url(#drop)" paint-order="stroke" stroke="#1a1a1a" stroke-width="2.5" stroke-linejoin="round">emojis.larah.lol</text>
      </svg>
    </a>
    <input type="text" id="search" placeholder="Search emojis..." autocomplete="off" autofocus />
  </header>
  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="grid" id="grid"></main>
  </div>
  <div class="toast" id="toast">Copied!</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
